{
  /* ══════════════════════════════════════════════════════════════════════════════
     EDITOR CONFIGURATION
     ══════════════════════════════════════════════════════════════════════════════
     Principles: High contrast, high legibility, minimal distraction,
     ══════════════════════════════════════════════════════════════════════════════ */

  /* ──────────────────────────────────────────────────────────────────────────────
     CORE DISPLAY & RESPIRATION
     ────────────────────────────────────────────────────────────────────────────── */
  "workbench.colorTheme": "GitHub Dark Colorblind (Beta)",
  "workbench.colorCustomizations": {
  },
  "editor.fontFamily": "Lilex",
  "editor.fontSize": 15,
  "editor.lineHeight": 1.8,
  "editor.letterSpacing": -0.6,
  "editor.fontLigatures": true,
  "editor.fontWeight": "400",

  "window.zoomLevel": 0,
  "window.commandCenter": true,

  /* ──────────────────────────────────────────────────────────────────────────────
     EDITOR CLEANUP: Absolute focus, zero visual noise
     ────────────────────────────────────────────────────────────────────────────── */
  "editor.codeLens": false,
  "editor.minimap.enabled": false,
  "editor.glyphMargin": true,
  "editor.folding": true,
  "editor.foldingImportsByDefault": false,
  "editor.scrollbar.vertical": "hidden",
  "editor.scrollbar.horizontal": "hidden",
  "editor.scrollbar.verticalSliderSize": 0,
  "editor.scrollbar.horizontalSliderSize": 0,

  "editor.renderLineHighlight": "none",
  "editor.renderWhitespace": "none",
  "editor.guides.indentation": false,
  "editor.guides.bracketPairs": false,
  "editor.guides.highlightActiveBracketPair": false,
  "editor.bracketPairColorization.enabled": false,
  "editor.selectionHighlight": false,
  "editor.occurrencesHighlight": "off",
  "editor.matchBrackets": "never",
  "editor.rulers": [140],
  "editor.wordWrap": "on",
  "editor.wordWrapColumn": 140,

  /* ──────────────────────────────────────────────────────────────────────────────
     CURSOR & SELECTION
     ────────────────────────────────────────────────────────────────────────────── */
  "editor.cursorBlinking": "phase",
  "editor.cursorSmoothCaretAnimation": "on",
  "editor.cursorWidth": 2,

  /* ──────────────────────────────────────────────────────────────────────────────
     INTELLEPHENSE & PHP LANGUAGE SERVER
     ────────────────────────────────────────────────────────────────────────────── */
  "php.suggest.basic": false,
  "intelephense.completion.triggerParameterHints": true,
  "intelephense.diagnostics.enable": true,
  "intelephense.runtime": "php",
  "intelephense.files.exclude": [
    "**/vendor/**",
    "**/.git/**",
    "**/node_modules/**",
    "bootstrap/cache/**",
    "internal/cache/**"
  ],
  "intelephense.files.maxSize": 5000000,
  "intelephense.stubs": [
    "bcmath",
    "ctype",
    "curl",
    "date",
    "standard",
    "SPL",
    "Reflection"
  ],

  /* ──────────────────────────────────────────────────────────────────────────────
     FORMAT ON SAVE & FORMATTER CONFIG
     ────────────────────────────────────────────────────────────────────────────── */
  "[php]": {
    "editor.defaultFormatter": "bmewburn.vscode-intelephense-client",
    "editor.formatOnSave": true,
    "editor.formatOnPaste": true,
    "editor.tabSize": 4,
    "editor.insertSpaces": false
  },

  "[blade]": {
    "editor.tabSize": 2,
    "editor.insertSpaces": true
  },

  "[json]": {
    "editor.defaultFormatter": "esbenp.prettier-vscode",
    "editor.formatOnSave": true,
    "editor.tabSize": 2
  },

  "[javascript]": {
    "editor.defaultFormatter": "esbenp.prettier-vscode",
    "editor.formatOnSave": true
  },

  /* ──────────────────────────────────────────────────────────────────────────────
     TAILWIND CSS INTEGRATION
     ────────────────────────────────────────────────────────────────────────────── */
  "tailwindCSS.includeLanguages": {
    "php": "html",
    "blade": "html",
    "plaintext": "html"
  },
  "tailwindCSS.experimental.classRegex": [
    "class=\"([^\"]*)\"",
    "class='([^']*)'",
    "@class\\(\\[([^\\]]*)\\]\\)"
  ],
  "tailwindCSS.showPixelEquivalents": true,

  /* ──────────────────────────────────────────────────────────────────────────────
     BRACKET & NAVIGATION BEHAVIOR
     ────────────────────────────────────────────────────────────────────────────── */
  "editor.autoClosingBrackets": "always",
  "editor.autoClosingDelete": "always",
  "editor.autoClosingOvertype": "always",
  "editor.autoClosingQuotes": "always",
  "editor.autoSurround": "brackets",
  "editor.autoIndent": "full",
  "editor.trimAutoWhitespace": true,

  /* ──────────────────────────────────────────────────────────────────────────────
     HINTS & INLAY DISPLAY (Intellephense)
     ────────────────────────────────────────────────────────────────────────────── */
  "editor.inlayHints.enabled": "on",
  "editor.inlayHints.fontSize": 13,
  "editor.inlayHints.padding": true,
  "intelephense.completion.maxItems": 100,

  /* ══════════════════════════════════════════════════════════════════════════════
     Teintes 
     ══════════════════════════════════════════════════════════════════════════════ */
  "editor.tokenColorCustomizations": {
    "comments": "#4F5B66",

    "textMateRules": [
      {
        "name": "Comment",
        "scope": ["comment", "punctuation.definition.comment"],
        "settings": {
          "foreground": "#4F5B66",
          "fontStyle": ""
        }
      },

      /* ────────────────────────────────────────────────────────────────────────
         WHITESPACE & STRUCTURAL
         ──────────────────────────────────────────────────────────────────────── */
      {
        "name": "Punctuation",
        "scope": [
          "punctuation",
          "punctuation.definition",
          "punctuation.separator",
          "punctuation.terminator",
          "punctuation.section"
        ],
        "settings": {
          "foreground": "#D4D4D4"
        }
      },

      /* ────────────────────────────────────────────────────────────────────────
         PHP OPENING/CLOSING TAGS
         ──────────────────────────────────────────────────────────────────────── */
      {
        "name": "PHP Tags (<?php, ?>)",
        "scope": [
          "punctuation.section.embedded.begin.php",
          "punctuation.section.embedded.end.php"
        ],
        "settings": {
          "foreground": "#E0E0E0",
          "fontStyle": "bold"
        }
      },

      /* ────────────────────────────────────────────────────────────────────────
         declare(strict_types=1) — WHITE HIGHLIGHT
         ──────────────────────────────────────────────────────────────────────── */
      {
        "name": "declare Statement (strict_types)",
        "scope": [
          "keyword.declare.php",
          "entity.name.constant.php"
        ],
        "settings": {
          "foreground": "#FFFFFF",
          "fontStyle": "bold"
        }
      },

      /* ────────────────────────────────────────────────────────────────────────
         KEYWORDS: CONTROL FLOW + new (RED COOL — #FF6B6B)
         ──────────────────────────────────────────────────────────────────────── */
      {
        "name": "Keywords — Control Flow, new keyword",
        "scope": [
          "keyword.control",
          "keyword.control.php",
          "keyword.control.exception.php",
          "keyword.other.new.php"
        ],
        "settings": {
          "foreground": "#FF6B6B"
        }
      },

      /* ────────────────────────────────────────────────────────────────────────
         KEYWORDS: MODIFIERS & STORAGE (RED COOL)
         ──────────────────────────────────────────────────────────────────────── */
      {
        "name": "Modifiers — public, private, static, final, etc.",
        "scope": [
          "storage.modifier",
          "keyword.other.modifier.php",
          "storage.type.function.php",
          "storage.type.class.php",
          "storage.type.interface.php",
          "storage.type.trait.php"
        ],
        "settings": {
          "foreground": "#ff7b72"
        }
      },

      /* ────────────────────────────────────────────────────────────────────────
         RETURN & TYPE DECLARATIONS (RED COOL)
         ──────────────────────────────────────────────────────────────────────── */
      {
        "name": "return keyword",
        "scope": ["keyword.control.return.php"],
        "settings": {
          "foreground": "#FF6B6B"
        }
      },

      /* ────────────────────────────────────────────────────────────────────────
         PRIMITIVE TYPES & TYPE HINTS (BRIGHT BLUE — #5BA3FF)
         ──────────────────────────────────────────────────────────────────────── */
      {
        "name": "PHP Primitive Types — bool, string, int, float, array, mixed, never, void, true, false, null",
        "scope": [
          "keyword.type.php",
          "support.type.builtin.php",
          "support.type.php",
          "support.type.primitive.php",
          "keyword.other.type.php",
          "constant.language.php"
        ],
        "settings": {
          "foreground": "#5BA3FF"
        }
      },

      /* ────────────────────────────────────────────────────────────────────────
         NAMESPACES, USE, CLASS NAMES, INTERFACES, parent:: (VERT FROID — #2FD886)
         ──────────────────────────────────────────────────────────────────────── */
      {
        "name": "Namespaces, Use Statements, Classes, Interfaces, parent::",
        "scope": [
          "support.other.namespace.php",
          "entity.name.namespace.php",
          "entity.name.namespace",
          "support.other.namespace.use.php",
          "support.other.namespace.use-as.php",
          "entity.other.alias.php",
          "support.class.php",
          "support.class.builtin.php",
          "support.class.exception.php",
          "entity.name.type.class.php",
          "entity.name.class.php",
          "entity.name.type",
          "entity.name.interface.php",
          "entity.name.trait.php",
          "support.constant.core.php",
          "keyword.other.self.php",
          "keyword.other.parent.php",
          "keyword.operator.class.php",
          "storage.type.php"
        ],
        "settings": {
          "foreground": "#7ee787"
        }
      },

      /* ────────────────────────────────────────────────────────────────────────
         FUNCTIONS & METHODS NAMES (__construct, getInstance, boot) — VIOLET #CE9DFF
         ──────────────────────────────────────────────────────────────────────── */
      {
        "name": "Function Names, Methods, __construct",
        "scope": [
          "entity.name.function.php",
          "entity.name.function",
          "support.function.php",
          "support.function.builtin.php"
        ],
        "settings": {
          "foreground": "#CE9DFF"
        }
      },

      /* ────────────────────────────────────────────────────────────────────────
         CONSTANTS & CLASS CONSTANTS (YELLOW/GOLD — #FFD700)
         ──────────────────────────────────────────────────────────────────────── */
      {
        "name": "Constants",
        "scope": [
          "entity.name.constant.php",
          "entity.name.constant"
        ],
        "settings": {
          "foreground": "#FFD700"
        }
      },

      /* ────────────────────────────────────────────────────────────────────────
         VARIABLES ($variable) — WHITE
         ──────────────────────────────────────────────────────────────────────── */
      {
        "name": "Variables",
        "scope": [
          "variable.php",
          "variable.other.php",
          "variable.other.property.php",
          "variable.other.object.property.php",
          "variable.other.constant.php",
          "punctuation.definition.variable.php",
          "variable.parameter.php",
          "entity.name.variable.parameter.php"
        ],
        "settings": {
          "foreground": "#FFFFFF"
        }
      },

      /* ────────────────────────────────────────────────────────────────────────
         STRINGS (ORANGE CHAUD — #FF9E64)
         ──────────────────────────────────────────────────────────────────────── */
      {
        "name": "Strings",
        "scope": [
          "string",
          "string.quoted.single.php",
          "string.quoted.double.php",
          "punctuation.definition.string"
        ],
        "settings": {
          "foreground": "#FF9E64"
        }
      },

      /* ────────────────────────────────────────────────────────────────────────
         NUMBERS (MAGENTA/PINK VIVE — #FF1493)
         ──────────────────────────────────────────────────────────────────────── */
      {
        "name": "Numbers",
        "scope": ["constant.numeric.php", "constant.numeric"],
        "settings": {
          "foreground": "#FF1493"
        }
      },

      /* ────────────────────────────────────────────────────────────────────────
         OPERATORS
         ──────────────────────────────────────────────────────────────────────── */
      {
        "name": "Operators",
        "scope": [
          "keyword.operator",
          "keyword.operator.comparison.php",
          "keyword.operator.arithmetic.php",
          "keyword.operator.logical.php",
          "keyword.operator.assignment.php"
        ],
        "settings": {
          "foreground": "#D4D4D4"
        }
      },

      /* ────────────────────────────────────────────────────────────────────────
         ARROW NOTATION (=> — ORANGE CLAIR)
         ──────────────────────────────────────────────────────────────────────── */
      {
        "name": "Arrow (=>)",
        "scope": ["keyword.operator.key.php"],
        "settings": {
          "foreground": "#FF9E64"
        }
      },

      /* ────────────────────────────────────────────────────────────────────────
         VARIABLE INTERPOLATION & ESCAPES
         ──────────────────────────────────────────────────────────────────────── */
      {
        "name": "Constant Character Escape",
        "scope": ["constant.character.escape"],
        "settings": {
          "foreground": "#FF1493"
        }
      }
    ]
  },

  /* ──────────────────────────────────────────────────────────────────────────────
     WORKBENCH & UI
     ────────────────────────────────────────────────────────────────────────────── */
  "workbench.activityBar.location": "bottom",
  "workbench.sideBar.location": "left",
  "workbench.editor.showTabs": "multiple",
  "workbench.editor.tabSizing": "shrink",
  "workbench.editor.tabCloseButton": "right",
  "workbench.startupEditor": "none",
  "workbench.welcomePage.walkthroughs.openOnInstall": false,

  /* ──────────────────────────────────────────────────────────────────────────────
     FILE EXPLORER
     ────────────────────────────────────────────────────────────────────────────── */
  "explorer.decorations.badges": true,
  "explorer.decorations.colors": true,
  "explorer.autoReveal": true,
  "explorer.autoRevealExclude": {
    "**/node_modules": true,
    "**/vendor": true,
    "bootstrap/cache": true,
    ".git": true
  },

  /* ──────────────────────────────────────────────────────────────────────────────
     SEARCH & REPLACE
     ────────────────────────────────────────────────────────────────────────────── */
  "search.smartCase": true,
  "search.exclude": {
    "**/node_modules": true,
    "**/vendor": true,
    "bootstrap/cache": true,
    ".git": true,
    "**/.env*": true
  },

  /* ──────────────────────────────────────────────────────────────────────────────
     TERMINAL
     ────────────────────────────────────────────────────────────────────────────── */
  "terminal.external.linuxExec": "x-terminal-emulator",
  "terminal.integrated.fontSize": 14,
  "terminal.integrated.lineHeight": 1.5,
  "terminal.integrated.fontFamily": "Fira Code, Courier Prime",
  "terminal.integrated.defaultProfile.linux": "bash",

  /* ──────────────────────────────────────────────────────────────────────────────
     GIT & VERSION CONTROL
     ────────────────────────────────────────────────────────────────────────────── */
  "git.enabled": true,
  "git.autofetch": false,
  "git.decorations.enabled": true,
  "git.ignoreLimitWarning": true,

  /* ──────────────────────────────────────────────────────────────────────────────
     TELEMETRY & PRIVACY
     ────────────────────────────────────────────────────────────────────────────── */
  "telemetry.telemetryLevel": "off",
  "redhat.telemetry.enabled": false,

  /* ──────────────────────────────────────────────────────────────────────────────
     EXTENSIONS
     ────────────────────────────────────────────────────────────────────────────── */
  "extensions.ignoreRecommendations": false,
  "extensions.showRecommendationsOnInstall": true,
  "editor.mouseWheelZoom": true,
  "terminal.integrated.mouseWheelZoom": true,
  "workbench.editor.tabActionLocation": "right"
}